version: 2
updates:
  # npm（pnpm ワークスペース）。ルート 1 件で apps/* ・ packages/* を横断。
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    # minimumReleaseAge（1 日）と整合させ、新規公開直後の取り込みで CI install が落ちるのを避ける。
    cooldown:
      default-days: 2
    commit-message:
      prefix: build
      include: scope
    groups:
      # minor / patch はまとめて 1 PR に（major は個別 PR でレビュー）。
      minor-and-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 10

  # GitHub Actions（.github/workflows のアクション）。
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns:
          - "*"
